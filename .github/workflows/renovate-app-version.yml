name: Update app version in Renovate Branches

on:
  push:
    branches: ["renovate/**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-app-version:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Get GitHub App user ID
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          app_slug="${{ steps.app-token.outputs.app-slug }}"
          user_id="$(gh api "/users/${app_slug}[bot]" --jq .id)"
          echo "id=$user_id" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Configure repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --local user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --local user.email "${{ steps.app-user.outputs.id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          gh auth setup-git

      - name: Get list of updated files by the last commit
        id: updated-files
        run: |
          files="$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" | tr '\n' ' ')"
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Run renovate-app-version.sh on updated app files
        run: |
          IFS=' ' read -ra files <<< "${{ steps.updated-files.outputs.files }}"

          for file in "${files[@]}"; do
            if [[ "$file" == apps/*/*/docker-compose.yml ]]; then
              app_name="$(cut -d'/' -f 2 <<< "$file")"
              old_version="$(cut -d'/' -f 3 <<< "$file")"
              chmod +x .github/workflows/renovate-app-version.sh
              .github/workflows/renovate-app-version.sh "$app_name" "$old_version"
            fi
          done

      - name: Commit & Push Changes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No version directory changes to commit."
            exit 0
          fi

          git add -A apps
          git commit -m "Update app version [skip ci]" --no-verify
          git push origin "HEAD:${{ github.ref_name }}"
